<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mintra home page</title>
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="mintra.css">
</head>
<body>
    <header class="">
        <nav class="navbar">
             <div class="first-bar">
                <img src="myntra.avif" style="height: 50px; width: 100px;" alt="">
             </div>
             <div class="second-bar">
                <a href="">MEN</a>
                <a href="">WOMEN</a>
                <a href="">KIDS</a>
                <a href="">HOME & LIVINGS</a>
                <a href="">BEAUTY</a>
                <a href="">STUDIO</a>
             </div>
             <div class="third-bar">
                <div class="search-contain">
                    <i id="search-icon" class="ri-search-line"></i>
                    <input type="search" id="search" placeholder="Search for products, brands and more">
                </div>
             </div>
             <div class="fourth-bar">
                <div class="profile1">
                    <i class="ri-user-3-line"></i>
                    <p>Profile</p>
                </div>
                <div class="profile2">
                    <i class="ri-poker-hearts-line"></i>
                    <p>Wishlist</p>
                </div>
                <div class="number1">
                    <p id="number1">1</p>
                </div>
                <div class="profile3">
                    <i class="ri-shopping-bag-line"></i>
                    <p>Bag</p>
                </div>
                <div class="number2">
                    <p id="number2">1</p>
                </div>
             </div>
        </nav>
    </header>
    <main class="main-contain">
        <section class="body-contain">
              <div class="card">
                
              </div>
        </section>
    </main>
</body>

<script src="mintra.js"></script>
</html>
